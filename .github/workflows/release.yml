name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_type:
        description: 'prod or test'
        default: prod
        type: choice
        options: [prod, test]
      create_release:
        description: 'Create GitHub release (only for tags or explicit opt-in)'
        default: false
        type: boolean
      fast_build:
        description: 'Incremental mkosi build (reuse artifacts). NOT reproducible — dev only.'
        default: false
        type: boolean
      roles:
        description: 'Comma-separated roles to extract image_hash for (dev: single role is faster).'
        default: 'worker,proxy,key-manager'
        type: string
      skip_package:
        description: 'Skip tarball, SLSA attestation, artifact upload, release — dev only.'
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-seal-server
  cancel-in-progress: false

jobs:
  release:
    runs-on: [self-hosted, linux, tdx-attestation]
    timeout-minutes: 360
    env:
      BUILD_TYPE: ${{ inputs.build_type || 'prod' }}
      COCOON_EXTRACT_SEAL_PORT: '12346'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: ${{ inputs.fast_build && false || true }}

      - name: Check TDX prerequisites
        run: |
          set -e
          test -e /dev/kvm || { echo "ERR: /dev/kvm not available" >&2; exit 1; }
          test -e /dev/tdx_guest -o -e /sys/module/kvm_intel/parameters/tdx \
            || echo "WARN: TDX device not obvious; extract-image-hash may fail"

      - name: Build TEE image
        run: |
          FAST=""
          if [[ "${{ inputs.fast_build }}" == "true" ]]; then
              FAST="--fast"
              echo "::warning::fast_build enabled — NOT reproducible, dev only"
          fi
          ./scripts/build-image $FAST "$BUILD_TYPE"

      - name: Start CI seal-server (own enclave, isolated vsock port)
        id: seal
        run: |
          set -e
          BIN="images/${BUILD_TYPE}/host-bin"

          # Acquire host-wide lock to prevent concurrent CI runs from
          # racing on the same vsock port.
          LOCK_FILE=/tmp/cocoon-ci-seal.lock
          touch "$LOCK_FILE"
          exec {LOCK_FD}>"$LOCK_FILE"
          if ! flock -n "$LOCK_FD"; then
              echo "Another CI job is using seal-server; waiting..."
              flock "$LOCK_FD"
          fi
          echo "seal_lock_fd=$LOCK_FD" >> "$GITHUB_OUTPUT"

          # Kill any leftover CI seal-server on our port from a prior failed run.
          if pgrep -f "seal-server.*--port ${COCOON_EXTRACT_SEAL_PORT}" >/dev/null; then
              echo "Killing leftover CI seal-server on port ${COCOON_EXTRACT_SEAL_PORT}"
              pkill -TERM -f "seal-server.*--port ${COCOON_EXTRACT_SEAL_PORT}" || true
              sleep 2
              pkill -KILL -f "seal-server.*--port ${COCOON_EXTRACT_SEAL_PORT}" 2>/dev/null || true
          fi

          echo "Starting CI seal-server on vsock port ${COCOON_EXTRACT_SEAL_PORT} (prod unaffected on 12345)"
          nohup "$BIN/seal-server" \
              --port "${COCOON_EXTRACT_SEAL_PORT}" \
              --enclave-path "$BIN/enclave.signed.so" \
              > seal-server.log 2>&1 &
          echo $! > seal-server.pid
          sleep 3
          if ! kill -0 "$(cat seal-server.pid)" 2>/dev/null; then
              echo "ERR: CI seal-server failed to start" >&2
              tail -n 40 seal-server.log >&2
              exit 1
          fi

      - name: Compute file checksums
        working-directory: images/${{ env.BUILD_TYPE }}
        run: |
          sha256sum OVMF.fd image.vmlinuz image.initrd image.cmdline image.img \
            | tee sha256sums.txt

      - name: Extract TEE image_hash per role
        env:
          ROLES: ${{ inputs.roles || 'worker,proxy,key-manager' }}
        run: |
          set -e
          : > MEASUREMENTS.txt
          echo "# COCOON TEE image_hash per role" >> MEASUREMENTS.txt
          echo "# Build: ${GITHUB_REF_NAME}@${GITHUB_SHA}" >> MEASUREMENTS.txt
          echo "# Build type: ${BUILD_TYPE}" >> MEASUREMENTS.txt
          echo "# Roles: ${ROLES}" >> MEASUREMENTS.txt
          echo "# Generated: $(date -u +%FT%TZ)" >> MEASUREMENTS.txt
          echo "" >> MEASUREMENTS.txt

          IFS=',' read -ra ROLE_ARR <<< "$ROLES"
          for role in "${ROLE_ARR[@]}"; do
              role="$(echo "$role" | tr -d '[:space:]')"
              [[ -z "$role" ]] && continue
              if [[ ! -d "spec/spec-${role}" ]]; then
                  echo "ERR: unknown role '$role' (spec/spec-${role} not found)" >&2
                  exit 1
              fi
              echo "=== Extracting image_hash for role: $role ==="
              hash=$(./scripts/extract-image-hash "images/${BUILD_TYPE}" "spec/spec-${role}")
              echo "${role}=${hash}" | tee -a MEASUREMENTS.txt
          done

      - name: Pack distribution tarball
        if: ${{ !inputs.skip_package }}
        run: |
          OUT="cocoon-tee-${BUILD_TYPE}-${GITHUB_REF_NAME}.tar.xz"
          tar -cJf "$OUT" -C "images/${BUILD_TYPE}" .
          sha256sum "$OUT" | tee -a "images/${BUILD_TYPE}/sha256sums.txt"
          echo "ARTIFACT_NAME=$OUT" >> "$GITHUB_ENV"

      - if: ${{ !inputs.skip_package }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            images/${{ env.BUILD_TYPE }}/OVMF.fd
            images/${{ env.BUILD_TYPE }}/image.vmlinuz
            images/${{ env.BUILD_TYPE }}/image.initrd
            images/${{ env.BUILD_TYPE }}/image.cmdline
            images/${{ env.BUILD_TYPE }}/image.img
            ${{ env.ARTIFACT_NAME }}

      - if: ${{ !inputs.skip_package }}
        uses: actions/upload-artifact@v4
        with:
          name: cocoon-release-${{ env.BUILD_TYPE }}-${{ github.ref_name }}
          path: |
            ${{ env.ARTIFACT_NAME }}
            MEASUREMENTS.txt
            images/${{ env.BUILD_TYPE }}/sha256sums.txt
          retention-days: 30

      - name: Create GitHub release
        if: ${{ !inputs.skip_package && (startsWith(github.ref, 'refs/tags/') || inputs.create_release) }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARTIFACT_NAME }}
            MEASUREMENTS.txt
            images/${{ env.BUILD_TYPE }}/sha256sums.txt
          body_path: MEASUREMENTS.txt
          generate_release_notes: true

      - name: Dump CI seal-server log
        if: always()
        run: |
          if [[ -f seal-server.log ]]; then
              echo "--- seal-server.log (last 200 lines) ---"
              tail -n 200 seal-server.log
              echo "--- end seal-server.log ---"
          else
              echo "seal-server.log not found"
          fi

      - name: Stop CI seal-server
        if: always()
        run: |
          if [[ -f seal-server.pid ]]; then
              PID=$(cat seal-server.pid)
              kill -TERM "$PID" 2>/dev/null || true
              for _ in $(seq 1 10); do
                  kill -0 "$PID" 2>/dev/null || break
                  sleep 1
              done
              kill -KILL "$PID" 2>/dev/null || true
              rm -f seal-server.pid
          fi
          # Sweep any stray CI seal-server on our port
          pkill -TERM -f "seal-server.*--port ${COCOON_EXTRACT_SEAL_PORT}" 2>/dev/null || true
